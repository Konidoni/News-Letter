name: Daily Samsung DA Briefing

on:
  # 매일 오후 2시 KST (= UTC 05:00) 자동 실행
  schedule:
    - cron: '0 5 * * *'

  # 수동 실행도 가능 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # GitHub Pages push 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch news & analyze with Claude
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_news.py

      - name: Build dashboard HTML
        run: python build_dashboard.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          # index.html만 배포
          include_files: index.html
